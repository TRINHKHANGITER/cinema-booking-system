
server:
  port: 8080
  servlet:
    context-path: /cinema/api

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
      # ddl-auto: create
    show-sql: true

jwt:
  signerKey: ${JWT_SIGNER_KEY}

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

storage:
  image-dir: data/image


gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL}



app:
  base-url: https://cytoarchitecturally-noncomplaisant-johana.ngrok-free.dev

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: http://localhost:5173/checkout/vnpay/return
  ipn-url: https://cytoarchitecturally-noncomplaisant-johana.ngrok-free.dev/cinema/api/checkout/vnpay/ipn
  version: 2.1.0
  command: pay
  curr-code: VND
  locale: vn
  order-type: otherx
