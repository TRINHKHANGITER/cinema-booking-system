server:
  port: 8080
  servlet:
    context-path: /cinema/api

spring:
  config:
    import: optional:file:src/main/java/com/dev/cinemasystem/.env[.properties]
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
 
  jpa:
    hibernate:
      ddl-auto: update
#        ddl-auto: create
    show-sql: true

jwt:
  signerKey: ${JWT_SIGNER_KEY}


springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

#  git log --graph --decorate --oneline --all -15


storage:
  image-dir: data/image

